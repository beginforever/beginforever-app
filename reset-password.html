<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="robots" content="noindex"/>
<title>Reset Password — Begin Forever</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --black:#0D0118;--dark1:#130220;--dark2:#1C0530;
  --royal:#3B0764;--royal-mid:#5B1A8A;
  --gold:#D4A017;--gold2:#F5C842;
  --white:#fff;--w40:rgba(255,255,255,.4);--w50:rgba(255,255,255,.5);
  --w70:rgba(255,255,255,.7);--w08:rgba(255,255,255,.08);--w15:rgba(255,255,255,.15);
  --red:#e74c3c;--green:#27ae60;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--dark1);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background-image:radial-gradient(ellipse at 60% 10%,rgba(91,26,138,.25) 0%,transparent 60%),radial-gradient(ellipse at 10% 90%,rgba(212,160,23,.06) 0%,transparent 50%);}
.card{background:#160428;border-radius:20px;padding:32px 26px;width:100%;max-width:420px;border:1px solid rgba(212,160,23,.2);box-shadow:0 20px 60px rgba(0,0,0,.5);}
.logo-wrap{width:72px;height:72px;border-radius:18px;background:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 0 0 3px rgba(212,160,23,.4),0 12px 40px rgba(0,0,0,.5);overflow:hidden;}
.logo-wrap img{width:64px;height:64px;object-fit:contain;}
h1{font-family:'Cinzel',serif;font-size:22px;color:var(--gold2);text-align:center;margin-bottom:6px;}
.sub{font-family:'EB Garamond',serif;font-style:italic;color:var(--w50);text-align:center;font-size:14px;margin-bottom:24px;}
.fg{margin-bottom:14px;}
label{font-size:11px;font-weight:700;color:var(--w40);display:block;margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase;}
input{width:100%;padding:13px 14px;border:1.5px solid rgba(255,255,255,.08);border-radius:10px;font-size:14px;color:#fff;background:rgba(59,7,100,.4);outline:none;transition:all .2s;font-family:'Nunito',sans-serif;}
input:focus{border-color:var(--gold);background:rgba(212,160,23,.05);box-shadow:0 0 0 3px rgba(212,160,23,.1);}
input::placeholder{color:rgba(255,255,255,.25);}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:56px;}
.pw-show{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--w40);font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1A0830;margin-top:4px;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.err{color:#ff6b6b;font-size:12px;text-align:center;margin-bottom:10px;display:none;padding:8px 12px;background:rgba(231,76,60,.08);border-radius:8px;}
.ok{color:#51cf66;font-size:13px;text-align:center;display:none;padding:12px;background:rgba(39,174,96,.08);border-radius:10px;border:1px solid rgba(39,174,96,.2);line-height:1.6;}
.rules{font-size:11px;color:var(--w40);margin-top:8px;line-height:1.8;padding:10px 12px;background:rgba(255,255,255,.03);border-radius:8px;}
.rules span{display:block;}
.rule-ok{color:#4ade80;}
.rule-bad{color:var(--w40);}
a.back{display:block;text-align:center;margin-top:16px;color:var(--w40);font-size:12px;text-decoration:none;}
a.back:hover{color:var(--gold2);}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap"><img src="logo.png" alt="Begin Forever" onerror="this.style.display='none'"/></div>
  <h1>Set New Password</h1>
  <p class="sub">Choose a strong password for your account</p>

  <div id="formSection">
    <div class="fg">
      <label>New Password</label>
      <div class="pw-wrap">
        <input type="password" id="pw1" placeholder="••••••••" oninput="checkRules()"/>
        <button class="pw-show" onclick="togglePw('pw1',this)">Show</button>
      </div>
    </div>
    <div class="rules" id="rules">
      <span id="r1" class="rule-bad">✗ At least 8 characters</span>
      <span id="r2" class="rule-bad">✗ One uppercase letter</span>
      <span id="r3" class="rule-bad">✗ One number</span>
    </div>
    <div class="fg" style="margin-top:14px;">
      <label>Confirm Password</label>
      <div class="pw-wrap">
        <input type="password" id="pw2" placeholder="••••••••"/>
        <button class="pw-show" onclick="togglePw('pw2',this)">Show</button>
      </div>
    </div>
    <p id="err" class="err"></p>
    <button class="btn" id="saveBtn" onclick="savePassword()">Save New Password ✦</button>
    <a href="/" class="back">← Back to Begin Forever</a>
  </div>

  <div id="successSection" style="display:none;">
    <div class="ok" style="display:block;">
      ✅ Password updated successfully!<br/>
      <strong>You can now sign in with your new password.</strong>
    </div>
    <a href="/" class="btn" style="display:block;text-align:center;text-decoration:none;margin-top:16px;">Go to Begin Forever →</a>
  </div>
</div>

<script>
var SB_URL = 'https://neftjxvovxocqabxjvme.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lZnRqeHZvdnhvY3FhYnhqdm1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3OTgyMjksImV4cCI6MjA5MDM3NDIyOX0.qWIVda-i5MsCy1OinW4JLLciI1B4ArBWviWIuGcOPBc';
var sb = supabase.createClient(SB_URL, SB_KEY);

// Handle the #access_token from Supabase reset email
window.addEventListener('hashchange', handleHash);
handleHash();

async function handleHash() {
  var hash = window.location.hash;
  if (!hash) return;
  var params = new URLSearchParams(hash.replace('#','?'));
  var type = params.get('type');
  var accessToken = params.get('access_token');
  var refreshToken = params.get('refresh_token');
  if (type === 'recovery' && accessToken) {
    await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
  }
}

function checkRules() {
  var pw = document.getElementById('pw1').value;
  function set(id, ok) {
    var el = document.getElementById(id);
    el.className = ok ? 'rule-ok' : 'rule-bad';
    el.textContent = (ok ? '✓ ' : '✗ ') + el.textContent.slice(2);
  }
  set('r1', pw.length >= 8);
  set('r2', /[A-Z]/.test(pw));
  set('r3', /[0-9]/.test(pw));
}

function togglePw(id, btn) {
  var inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? 'Show' : 'Hide';
}

async function savePassword() {
  var pw1 = document.getElementById('pw1').value;
  var pw2 = document.getElementById('pw2').value;
  var err = document.getElementById('err');
  err.style.display = 'none';

  if (pw1.length < 8)  { err.textContent = 'Password must be at least 8 characters.'; err.style.display = 'block'; return; }
  if (!/[A-Z]/.test(pw1)) { err.textContent = 'Add at least one uppercase letter.'; err.style.display = 'block'; return; }
  if (!/[0-9]/.test(pw1)) { err.textContent = 'Add at least one number.'; err.style.display = 'block'; return; }
  if (pw1 !== pw2) { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; return; }

  var btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';

  var res = await sb.auth.updateUser({ password: pw1 });
  if (res.error) {
    err.textContent = res.error.message || 'Could not update password. Please request a new reset link.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Save New Password ✦';
    return;
  }

  document.getElementById('formSection').style.display = 'none';
  document.getElementById('successSection').style.display = '';
}
</script>
</body>
</html>
